version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: botany-park-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - botany-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botany-park-backend
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - botany-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: botany-park-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - botany-network

volumes:
  redis-data:

networks:
  botany-network:
    driver: bridge
